name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        preset: [default, sanitizers]
        exclude:
          - os: windows-latest
            preset: sanitizers

    steps:
      - uses: actions/checkout@v4

      - uses: lukka/get-cmake@latest

      - uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

  fuzz-smoke:
    name: ubuntu-latest / fuzzers
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++

    steps:
      - uses: actions/checkout@v4

      - uses: lukka/get-cmake@latest

      - name: Install Clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Configure fuzzers
        run: cmake --preset fuzzers

      - name: Build fuzzers
        run: cmake --build --preset fuzzers

      - name: Run fuzz smoke tests
        run: ctest --preset fuzzers -R 'cgraph_fuzz.*smoke_test'
