name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}
    env:
      VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/triplets
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        preset: [default, sanitizers]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: lukka/get-cmake@latest

      - uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

  fuzz-smoke:
    name: ubuntu-latest / fuzzers
    runs-on: ubuntu-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-linux-clang
      VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/triplets

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: lukka/get-cmake@latest

      - name: Install Clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Configure fuzzers
        run: cmake --preset fuzzers -DVCPKG_TARGET_TRIPLET=${VCPKG_DEFAULT_TRIPLET}

      - name: Build fuzzers
        run: cmake --build --preset fuzzers

      - name: Run fuzz smoke tests
        run: ctest --preset fuzzers -R 'cgraph_fuzz.*smoke_test'
